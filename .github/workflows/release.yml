name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install root deps
        run: npm ci

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run release
          title: "chore: release packages"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Sync Python SDK version with JS SDK
        if: steps.changesets.outputs.published == 'true'
        run: |
          JS_VERSION=$(node -p "require('./packages/js-sdk/package.json').version")
          echo "Syncing Python SDK to version $JS_VERSION"
          # Update version in pyproject.toml
          sed -i "s/^version = .*/version = \"$JS_VERSION\"/" packages/python-sdk/pyproject.toml
          # Commit if changed
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/python-sdk/pyproject.toml
          git diff --staged --quiet || git commit -m "chore: sync Python SDK version to $JS_VERSION"
          git push || true

      - name: Publish Python SDK
        if: steps.changesets.outputs.published == 'true'
        run: |
          cd packages/python-sdk
          pip install build twine
          python -m build
          python -m twine upload dist/* --non-interactive
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
