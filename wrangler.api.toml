name = "translation-helps-api"
main = "src/api/worker.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

# ---------------------------------------------------------------------------
# Bindings — the REST API worker owns all Door43 caching infrastructure.
# The MCP worker accesses these exclusively through the service binding.
# ---------------------------------------------------------------------------

[[kv_namespaces]]
binding = "TRANSLATION_HELPS_CACHE"
id = "a0b2bcf08829441e932230cb06cb5e07"
preview_id = "3073e58cc3eb4f16958854a6ec1531e6"

[[r2_buckets]]
binding = "ZIP_FILES"
bucket_name = "translation-helps-mcp-zip-persistence"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "translation_helps_metrics"

# ---------------------------------------------------------------------------
# Environment overrides
# ---------------------------------------------------------------------------

[env.production]
vars = { NODE_ENV = "production" }

[[env.production.kv_namespaces]]
binding = "TRANSLATION_HELPS_CACHE"
id = "a0b2bcf08829441e932230cb06cb5e07"

[[env.production.r2_buckets]]
binding = "ZIP_FILES"
bucket_name = "translation-helps-mcp-zip-persistence"

[[env.production.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "translation_helps_metrics"

[env.preview]
vars = { NODE_ENV = "development" }

[[env.preview.kv_namespaces]]
binding = "TRANSLATION_HELPS_CACHE"
id = "3073e58cc3eb4f16958854a6ec1531e6"
preview_id = "3073e58cc3eb4f16958854a6ec1531e6"

[[env.preview.r2_buckets]]
binding = "ZIP_FILES"
bucket_name = "translation-helps-mcp-zip-persistence"

[[env.preview.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "translation_helps_metrics"
