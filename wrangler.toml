name = "translation-helps-mcp"
main = "src/worker.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Workers Assets — SvelteKit output goes here
[assets]
directory = "web/.svelte-kit/cloudflare"
binding = "ASSETS"

# Structured JSON logging via Workers Logs (enables log tailing + Logpush)
[observability]
enabled = true
head_sampling_rate = 1

# ---------------------------------------------------------------------------
# Bindings
# ---------------------------------------------------------------------------

[[kv_namespaces]]
binding = "TRANSLATION_HELPS_CACHE"
id = "a0b2bcf08829441e932230cb06cb5e07"
preview_id = "3073e58cc3eb4f16958854a6ec1531e6"

[[r2_buckets]]
binding = "ZIP_FILES"
bucket_name = "translation-helps-mcp-zip-persistence"

# Analytics Engine for performance metrics + error-rate tracking
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "translation_helps_metrics"

# Durable Object for McpAgent (TranslationHelpsMCP)
[[durable_objects.bindings]]
name = "MCP_AGENT"
class_name = "TranslationHelpsMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TranslationHelpsMCP"]

# Service binding to the REST Data API worker (zero-latency same-DC call)
[[services]]
binding = "API"
service = "translation-helps-api"

# ---------------------------------------------------------------------------
# Top-level vars (used in local wrangler dev; overridden by service binding in prod)
# ---------------------------------------------------------------------------
# Fallback URL for the REST API worker when the service binding is unavailable
# (e.g. when running only one wrangler dev process). Set to the API worker port.
[vars]
API_BASE_URL = "http://localhost:8788"

# ---------------------------------------------------------------------------
# Environment overrides
# ---------------------------------------------------------------------------

[env.production]
vars = { NODE_ENV = "production" }

[[env.production.kv_namespaces]]
binding = "TRANSLATION_HELPS_CACHE"
id = "a0b2bcf08829441e932230cb06cb5e07"

[[env.production.r2_buckets]]
binding = "ZIP_FILES"
bucket_name = "translation-helps-mcp-zip-persistence"

[[env.production.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "translation_helps_metrics"

[[env.production.durable_objects.bindings]]
name = "MCP_AGENT"
class_name = "TranslationHelpsMCP"

[[env.production.services]]
binding = "API"
service = "translation-helps-api"

[env.preview]
vars = { NODE_ENV = "development" }

[[env.preview.kv_namespaces]]
binding = "TRANSLATION_HELPS_CACHE"
id = "3073e58cc3eb4f16958854a6ec1531e6"
preview_id = "3073e58cc3eb4f16958854a6ec1531e6"

[[env.preview.r2_buckets]]
binding = "ZIP_FILES"
bucket_name = "translation-helps-mcp-zip-persistence"

[[env.preview.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "translation_helps_metrics"

[[env.preview.durable_objects.bindings]]
name = "MCP_AGENT"
class_name = "TranslationHelpsMCP"

[[env.preview.services]]
binding = "API"
service = "translation-helps-api"
